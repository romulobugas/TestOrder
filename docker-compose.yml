services:
  mysql:
    image: mysql:8
    container_name: testorder-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: testorder
      MYSQL_DATABASE: testorder
      MYSQL_USER: testorder
      MYSQL_PASSWORD: testorder
    volumes:
      - testorder_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptestorder"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  testorder_mysql_data:
